<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Anarack</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=JetBrains+Mono:wght@300;400;500;600&display=swap');

    :root {
      --bg: #121110;
      --surface: #1a1918;
      --surface-raised: #222120;
      --border: rgba(255,255,255,0.06);
      --border-strong: rgba(255,255,255,0.1);
      --text: #e8e4de;
      --text-dim: rgba(255,255,255,0.35);
      --text-muted: rgba(255,255,255,0.18);
      --accent: #E8A849;
      --accent-dim: rgba(232,168,73,0.15);
      --accent-glow: rgba(232,168,73,0.4);
      --live: #5BDB7E;
      --live-glow: rgba(91,219,126,0.5);
      --danger: #E85454;
      --mono: 'JetBrains Mono', monospace;
      --display: 'Syne', sans-serif;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      height: 100%;
    }
    body {
      font-family: var(--mono);
      background: var(--bg);
      color: var(--text);
      height: 100%;
      overflow: hidden;
    }

    /* ── Noise grain overlay ── */
    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 9999;
    }

    /* ── Shell ── */
    .shell {
      height: 100%;
      display: flex;
      flex-direction: column;
      padding: 0 16px;
    }

    /* ── Top bar ── */
    .topbar {
      display: flex;
      align-items: center;
      padding: 10px 0;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .brand {
      font-family: var(--display);
      font-weight: 800;
      font-size: 15px;
      letter-spacing: 6px;
      text-transform: uppercase;
      color: var(--accent);
    }
    .topbar-right {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 16px;
    }
    .conn-group {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .conn-label {
      font-size: 9px;
      font-weight: 500;
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: 2px;
    }
    .conn-input {
      background: var(--surface);
      color: var(--text);
      border: 1px solid var(--border-strong);
      padding: 5px 10px;
      font-family: var(--mono);
      font-size: 11px;
      font-weight: 400;
      border-radius: 3px;
      outline: none;
      transition: border-color 0.2s;
    }
    .conn-input:focus { border-color: var(--accent); }
    .conn-select {
      background: var(--surface);
      color: var(--text);
      border: 1px solid var(--border-strong);
      padding: 5px 10px;
      font-family: var(--mono);
      font-size: 11px;
      border-radius: 3px;
      outline: none;
    }
    .conn-btn {
      background: var(--accent);
      color: var(--bg);
      border: none;
      padding: 5px 16px;
      font-family: var(--mono);
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      border-radius: 3px;
      cursor: pointer;
      transition: all 0.15s;
    }
    .conn-btn:hover { filter: brightness(1.1); }
    .conn-btn.disconnect { background: var(--danger); color: #fff; }
    .conn-btn.secondary {
      background: var(--surface-raised);
      color: var(--text-dim);
      border: 1px solid var(--border-strong);
    }
    .conn-btn.secondary:hover { color: var(--text); background: #2a2928; }
    .midi-status { font-size: 9px; color: var(--text-muted); }

    /* ── Session header ── */
    .session {
      display: flex;
      align-items: baseline;
      padding: 14px 0 12px;
      gap: 16px;
      flex-shrink: 0;
    }
    .session-synth {
      font-family: var(--display);
      font-weight: 700;
      font-size: 32px;
      letter-spacing: -0.5px;
      color: var(--text);
      line-height: 1;
    }
    .session-meta {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-left: auto;
    }
    .status-pill {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 4px 10px;
      border-radius: 20px;
      background: var(--surface);
      border: 1px solid var(--border);
    }
    .status-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--text-muted);
      transition: all 0.3s;
    }
    .status-dot.connected { background: var(--live); box-shadow: 0 0 8px var(--live-glow); }
    .status-dot.connecting { background: var(--accent); box-shadow: 0 0 8px var(--accent-glow); animation: pulse 1.5s infinite; }
    @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }
    .status-label {
      font-size: 9px;
      font-weight: 500;
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: 1.5px;
    }
    .latency-val {
      font-family: var(--mono);
      font-size: 20px;
      font-weight: 300;
      color: var(--live);
      letter-spacing: -1px;
    }
    .latency-unit {
      font-size: 10px;
      color: var(--text-dim);
      margin-left: 2px;
      font-weight: 500;
    }

    /* ── Parameter surface ── */
    .param-surface {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 16px 16px;
      margin-bottom: 8px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
    }
    .sections {
      display: flex;
      gap: 0;
      width: 100%;
    }
    .section {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 0 6px;
      border-right: 1px solid var(--border);
    }
    .section:last-child { border-right: none; }
    .section-title {
      font-family: var(--display);
      font-size: 9px;
      font-weight: 600;
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: 3px;
      margin-bottom: 14px;
      white-space: nowrap;
    }
    .section-knobs {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 4px;
    }

    /* ── Knob ── */
    .knob-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      cursor: pointer;
      width: 70px;
      padding: 4px 0;
      border-radius: 6px;
      transition: background 0.15s;
    }
    .knob-wrap:hover { background: rgba(255,255,255,0.02); }
    .knob-wrap canvas { cursor: grab; }
    .knob-wrap canvas:active { cursor: grabbing; }
    .knob-label {
      font-family: var(--mono);
      font-size: 8px;
      font-weight: 500;
      color: var(--text-dim);
      margin-top: 4px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    .knob-map {
      font-size: 7px;
      color: var(--text-muted);
      height: 10px;
      font-weight: 400;
    }
    .knob-wrap.learning .knob-label { color: var(--accent); }

    /* ── Program strip ── */
    .prog-strip {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 16px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      margin-bottom: 8px;
      flex-shrink: 0;
    }
    .prog-label {
      font-size: 9px;
      font-weight: 500;
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: 2px;
    }
    .prog-btn {
      background: var(--surface-raised);
      color: var(--text-dim);
      border: 1px solid var(--border-strong);
      border-radius: 3px;
      padding: 3px 8px;
      font-family: var(--mono);
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.1s;
      line-height: 1;
    }
    .prog-btn:hover { color: var(--text); background: #2e2d2c; }
    .prog-num {
      background: var(--bg);
      color: var(--accent);
      border: 1px solid var(--border-strong);
      border-radius: 3px;
      padding: 3px 4px;
      width: 40px;
      text-align: center;
      font-family: var(--mono);
      font-size: 13px;
      font-weight: 500;
      outline: none;
    }
    .prog-num:focus { border-color: var(--accent); }
    .bank-btn {
      background: transparent !important;
      color: var(--text-muted) !important;
      border: 1px solid var(--border) !important;
      border-radius: 3px;
      padding: 4px 8px;
      font-family: var(--mono);
      font-size: 9px;
      font-weight: 600;
      cursor: pointer;
      margin: 0 1px;
      transition: all 0.1s;
      letter-spacing: 1px;
    }
    .bank-btn:hover { color: var(--text-dim) !important; border-color: var(--border-strong) !important; }
    .bank-btn.active {
      color: var(--accent) !important;
      border-color: var(--accent) !important;
      background: var(--accent-dim) !important;
    }

    /* ── Keyboard ── */
    .keyboard-surface {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px 12px 16px;
      margin-bottom: 8px;
      overflow: hidden;
      flex: 1;
      display: flex;
      align-items: stretch;
      min-height: 0;
    }
    .keyboard-wrap { width: 100%; display: flex; flex-direction: column; }
    .keyboard {
      position: relative;
      user-select: none;
      -webkit-user-select: none;
      width: 100%;
      flex: 1;
    }
    .key {
      position: absolute;
      cursor: pointer;
      transition: background 0.04s, box-shadow 0.06s;
    }
    .key.white {
      background: linear-gradient(180deg, #f2f0ec 0%, #e8e6e1 50%, #dfddd8 100%);
      border: 1px solid rgba(0,0,0,0.15);
      border-top: none;
      border-radius: 0 0 4px 4px;
      z-index: 1;
    }
    .key.white:hover {
      background: linear-gradient(180deg, #f7f5f1 0%, #edebe6 50%, #e4e2dd 100%);
    }
    .key.white.active {
      background: linear-gradient(180deg,
        color-mix(in srgb, var(--accent) 15%, #e8e6e1) 0%,
        color-mix(in srgb, var(--accent) 10%, #dfddd8) 100%);
      box-shadow: inset 0 0 12px var(--accent-dim), 0 0 8px var(--accent-dim);
    }
    .key.black {
      background: linear-gradient(180deg, #2a2928 0%, #1e1d1c 50%, #161514 100%);
      border: 1px solid #000;
      border-top: none;
      border-radius: 0 0 3px 3px;
      z-index: 2;
      box-shadow: 0 2px 6px rgba(0,0,0,0.5);
    }
    .key.black:hover {
      background: linear-gradient(180deg, #333231 0%, #262524 50%, #1c1b1a 100%);
    }
    .key.black.active {
      background: linear-gradient(180deg,
        color-mix(in srgb, var(--accent) 25%, #2a2928) 0%,
        color-mix(in srgb, var(--accent) 15%, #161514) 100%);
      box-shadow: 0 0 12px var(--accent-dim);
    }

    /* ── Footer ── */
    .footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 6px 0;
      flex-shrink: 0;
    }
    .footer-text {
      font-size: 9px;
      color: var(--text-muted);
      letter-spacing: 0.5px;
    }
    .footer-text .accent { color: var(--text-dim); }
    .footer-toggle { cursor: pointer; }
    .footer-toggle:hover { color: var(--text-dim); }

    /* ── Log (hidden by default, toggle with footer click) ── */
    #log {
      display: none;
      width: 100%;
      height: 48px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 6px 10px;
      margin-bottom: 8px;
      font-family: var(--mono);
      font-size: 9px;
      font-weight: 400;
      color: var(--text-muted);
      overflow-y: auto;
      line-height: 1.6;
      flex-shrink: 0;
    }
    #log.visible { display: block; }
    #log div { opacity: 0.6; }
    #log div:last-child { opacity: 1; color: var(--text-dim); }
  </style>
</head>
<body>
<div class="shell">

  <!-- Top bar -->
  <div class="topbar">
    <div class="brand">Anarack</div>
    <div class="topbar-right">
      <div class="conn-group">
        <span class="conn-label">Server</span>
        <input class="conn-input" type="text" id="ws-host" value="play.anarack.com" style="width:180px">
      </div>
      <div class="conn-group">
        <span class="conn-label">MIDI</span>
        <select class="conn-select" id="midi-input"><option value="">None</option></select>
        <span class="midi-status" id="midi-input-status"></span>
      </div>
      <button class="conn-btn" id="connect-btn" onclick="toggleConnection()">Connect</button>
      <button class="conn-btn secondary" onclick="measureLatency()">Ping</button>
    </div>
  </div>

  <!-- Session header -->
  <div class="session">
    <div class="session-synth" id="synth-name">Prophet Rev2</div>
    <div class="session-meta">
      <div class="status-pill">
        <div class="status-dot" id="status-led"></div>
        <span class="status-label" id="status">Offline</span>
      </div>
      <span class="latency-val" id="latency"></span>
    </div>
  </div>

  <!-- Parameters -->
  <div class="param-surface">
    <div class="sections" id="panel"></div>
  </div>

  <!-- Program / Bank -->
  <div class="prog-strip">
    <span class="prog-label">Program</span>
    <button class="prog-btn" onclick="changeProgram(-1)">&larr;</button>
    <input class="prog-num" type="number" id="program-num" value="0" min="0" max="127">
    <button class="prog-btn" onclick="changeProgram(1)">&rarr;</button>
    <span class="prog-label" style="margin-left:12px">Bank</span>
    <span id="bank-buttons"></span>
    <span class="footer-text accent" style="margin-left:auto" id="learn-hint">Double-click knob to MIDI learn</span>
  </div>

  <!-- Keyboard -->
  <div class="keyboard-surface">
    <div class="keyboard-wrap">
      <div class="keyboard" id="keyboard"></div>
    </div>
  </div>

  <!-- Log -->
  <div id="log"></div>

  <!-- Footer -->
  <div class="footer">
    <span class="footer-text" id="stats">MIDI: 0 &middot; Audio: 0</span>
    <span class="footer-text footer-toggle" onclick="document.getElementById('log').classList.toggle('visible')">Log</span>
  </div>

</div>

<script>
// ─────────────────────────────────────────────
// Synth config (swap this for different synths)
// ─────────────────────────────────────────────
const SYNTH_NAME = "Prophet Rev2";

const PANEL = [
  { name: "Osc 1", params: [
    { label: "Freq", cc: 20, def: 64 }, { label: "Fine", cc: 21, def: 64 },
    { label: "Shape", cc: 22, def: 0 }, { label: "Glide", cc: 23, def: 0 },
  ]},
  { name: "Osc 2", params: [
    { label: "Freq", cc: 24, def: 64 }, { label: "Fine", cc: 25, def: 64 },
    { label: "Shape", cc: 26, def: 0 }, { label: "Glide", cc: 27, def: 0 },
  ]},
  { name: "Mixer", params: [
    { label: "Mix", cc: 28, def: 64 }, { label: "Noise", cc: 29, def: 0 },
    { label: "Sub", cc: 8, def: 0 }, { label: "Slop", cc: 9, def: 0 },
  ]},
  { name: "Filter", params: [
    { label: "Cutoff", cc: 102, def: 100 }, { label: "Reso", cc: 103, def: 0 },
    { label: "Key", cc: 104, def: 0 }, { label: "Env", cc: 106, def: 64 },
  ]},
  { name: "Filter Env", params: [
    { label: "Atk", cc: 109, def: 0 }, { label: "Dec", cc: 110, def: 64 },
    { label: "Sus", cc: 111, def: 64 }, { label: "Rel", cc: 112, def: 40 },
  ]},
  { name: "Amp", params: [
    { label: "Level", cc: 113, def: 100 }, { label: "Pan", cc: 114, def: 64 },
  ]},
  { name: "Amp Env", params: [
    { label: "Atk", cc: 118, def: 0 }, { label: "Dec", cc: 119, def: 64 },
    { label: "Sus", cc: 75, def: 100 }, { label: "Rel", cc: 76, def: 40 },
  ]},
  { name: "Effects", params: [
    { label: "Mix", cc: 17, def: 0 }, { label: "P1", cc: 12, def: 64 },
    { label: "P2", cc: 13, def: 64 },
  ]},
];

document.getElementById("synth-name").textContent = SYNTH_NAME;
document.title = `Anarack — ${SYNTH_NAME}`;

// ─────────────────────────────────────────────
// State
// ─────────────────────────────────────────────
let ws = null, audioWs = null, audioCtx = null;
let midiAccess = null, activeMidiInput = null;
let activeNotes = new Set();
let nextPlayTime = 0, audioStarted = false;
const SAMPLE_RATE = 48000;
const BUFFER_AHEAD = 0.001;

const knobs = [];
let learningKnob = null;
let ccMap = {};
let midiCount = 0, audioCount = 0;

// ─────────────────────────────────────────────
// Design system colors
// ─────────────────────────────────────────────
const ACCENT = '#E8A849';
const ACCENT_DIM = 'rgba(232,168,73,0.2)';
const TRACK_COLOR = 'rgba(255,255,255,0.06)';
const TEXT_DIM = 'rgba(255,255,255,0.3)';

// ─────────────────────────────────────────────
// Knob — arc indicator style
// ─────────────────────────────────────────────
function createKnob(parent, label, cc, defaultVal) {
  const wrap = document.createElement("div");
  wrap.className = "knob-wrap";

  const canvas = document.createElement("canvas");
  const SIZE = 54;
  const DPR = window.devicePixelRatio || 1;
  canvas.width = SIZE * DPR; canvas.height = SIZE * DPR;
  canvas.style.width = SIZE + "px"; canvas.style.height = SIZE + "px";
  const mapLabel = document.createElement("div");
  mapLabel.className = "knob-map";
  const nameLabel = document.createElement("div");
  nameLabel.className = "knob-label";
  nameLabel.textContent = label;

  wrap.appendChild(canvas);
  wrap.appendChild(nameLabel);
  wrap.appendChild(mapLabel);
  parent.appendChild(wrap);

  const knob = { canvas, cc, value: defaultVal, label, mappedCC: null, wrap, mapLabel, dragY: null, dragVal: null, size: SIZE, dpr: DPR };
  knobs.push(knob);

  drawKnob(knob);
  updateKnobMapLabel(knob);

  canvas.addEventListener("mousedown", (e) => { knob.dragY = e.clientY; knob.dragVal = knob.value; e.preventDefault(); });
  window.addEventListener("mousemove", (e) => {
    if (knob.dragY === null) return;
    const dy = knob.dragY - e.clientY;
    setKnobValue(knob, knob.dragVal + dy * 0.7, true);
  });
  window.addEventListener("mouseup", () => { knob.dragY = null; });

  canvas.addEventListener("touchstart", (e) => { knob.dragY = e.touches[0].clientY; knob.dragVal = knob.value; e.preventDefault(); });
  window.addEventListener("touchmove", (e) => {
    if (knob.dragY === null) return;
    const dy = knob.dragY - e.touches[0].clientY;
    setKnobValue(knob, knob.dragVal + dy * 0.7, true);
  });
  window.addEventListener("touchend", () => { knob.dragY = null; });

  canvas.addEventListener("wheel", (e) => { e.preventDefault(); setKnobValue(knob, knob.value + (e.deltaY < 0 ? 1 : -1), true); });
  wrap.addEventListener("dblclick", (e) => { e.preventDefault(); startLearn(knob); });

  return knob;
}

function drawKnob(knob, learning = false) {
  const ctx = knob.canvas.getContext("2d");
  const DPR = knob.dpr;
  const S = knob.size * DPR;
  const cx = S / 2, cy = S / 2;
  const R = S * 0.40;

  ctx.clearRect(0, 0, S, S);

  const startAng = Math.PI * 0.75;   // 135 degrees — bottom-left
  const endAng = Math.PI * 2.25;     // 405 degrees — bottom-right
  const sweep = endAng - startAng;   // 270 degrees
  const valAng = startAng + (knob.value / 127) * sweep;

  // Track (background arc)
  ctx.beginPath();
  ctx.arc(cx, cy, R, startAng, endAng);
  ctx.strokeStyle = TRACK_COLOR;
  ctx.lineWidth = 3 * DPR;
  ctx.lineCap = 'round';
  ctx.stroke();

  // Value arc
  if (knob.value > 0) {
    ctx.beginPath();
    ctx.arc(cx, cy, R, startAng, valAng);
    ctx.strokeStyle = learning ? ACCENT : 'rgba(255,255,255,0.5)';
    ctx.lineWidth = 3 * DPR;
    ctx.lineCap = 'round';
    ctx.stroke();
  }

  // Position dot
  const dotR = 3.5 * DPR;
  const dotX = cx + Math.cos(valAng) * R;
  const dotY = cy + Math.sin(valAng) * R;
  ctx.beginPath();
  ctx.arc(dotX, dotY, dotR, 0, Math.PI * 2);
  ctx.fillStyle = learning ? ACCENT : '#fff';
  ctx.fill();

  // Glow behind dot
  if (learning) {
    ctx.beginPath();
    ctx.arc(dotX, dotY, dotR + 4 * DPR, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(232,168,73,0.15)';
    ctx.fill();
  }

  // Value text (center)
  ctx.fillStyle = learning ? ACCENT : TEXT_DIM;
  ctx.font = `${10 * DPR}px 'JetBrains Mono', monospace`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(knob.value, cx, cy + 1 * DPR);
}

function setKnobValue(knob, val, send) {
  knob.value = Math.max(0, Math.min(127, Math.round(val)));
  drawKnob(knob, knob === learningKnob);
  if (send) sendMidi(0xB0, knob.cc, knob.value);
}

function updateKnobMapLabel(knob) {
  const controllerCC = Object.entries(ccMap).find(([k, v]) => v === knob.cc);
  if (controllerCC) {
    knob.mapLabel.textContent = `CC${controllerCC[0]}`;
    knob.mapLabel.style.color = 'var(--text-muted)';
    knob.mappedCC = parseInt(controllerCC[0]);
  } else {
    knob.mapLabel.textContent = "";
    knob.mappedCC = null;
  }
}

// ─────────────────────────────────────────────
// MIDI Learn
// ─────────────────────────────────────────────
function startLearn(knob) {
  if (learningKnob === knob) { learningKnob = null; drawKnob(knob); setLearnHint("Double-click knob to MIDI learn"); return; }
  if (learningKnob) { learningKnob.wrap.classList.remove("learning"); drawKnob(learningKnob); }
  learningKnob = knob;
  drawKnob(knob, true);
  knob.wrap.classList.add("learning");
  setLearnHint(`Waiting for input → ${knob.label}`);
}

function finishLearn(controllerCC) {
  if (!learningKnob) return false;
  const synthCC = learningKnob.cc;
  for (const [k, v] of Object.entries(ccMap)) { if (v === synthCC) delete ccMap[k]; }
  delete ccMap[controllerCC];
  ccMap[controllerCC] = synthCC;
  saveMappings();
  setLearnHint(`CC${controllerCC} → ${learningKnob.label}`);
  learningKnob.wrap.classList.remove("learning");
  drawKnob(learningKnob);
  learningKnob = null;
  knobs.forEach(k => updateKnobMapLabel(k));
  return true;
}

function setLearnHint(text) { document.getElementById("learn-hint").textContent = text; }

function loadMappings() {
  try { const s = localStorage.getItem("anarack_cc_map"); if (s) ccMap = JSON.parse(s); } catch(e) {}
  knobs.forEach(k => updateKnobMapLabel(k));
}

function saveMappings() { localStorage.setItem("anarack_cc_map", JSON.stringify(ccMap)); }

function autoDetectController() {
  if (!midiAccess || Object.keys(ccMap).length > 0) return;
  const profiles = {
    "launchkey": { 21: 102, 22: 103, 23: 22, 24: 28, 25: 118, 26: 119, 27: 75, 28: 76 },
    "mpk": { 70: 102, 71: 103, 72: 22, 73: 28, 74: 118, 75: 119, 76: 75, 77: 76 },
    "keylab": { 74: 102, 71: 103, 18: 22, 19: 28, 16: 118, 17: 119, 91: 75, 79: 76 },
  };
  for (const [, input] of midiAccess.inputs) {
    const name = (input.name || "").toLowerCase();
    for (const [key, map] of Object.entries(profiles)) {
      if (name.includes(key)) { ccMap = { ...map }; saveMappings(); knobs.forEach(k => updateKnobMapLabel(k)); log(`Auto-mapped ${key}`); return; }
    }
  }
}

// ─────────────────────────────────────────────
// Audio
// ─────────────────────────────────────────────
function initAudio() {
  if (audioCtx) return;
  audioCtx = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: SAMPLE_RATE, latencyHint: "interactive" });
  log(`Audio: ${audioCtx.sampleRate}Hz, base ${((audioCtx.baseLatency||0)*1000).toFixed(0)}ms`);
}

function connectAudio(host) {
  const isLocal = host.startsWith("localhost") || host.startsWith("192.168") || host.startsWith("127.0");
  audioWs = new WebSocket(`${isLocal ? "ws" : "wss"}://${host}/audio`);
  audioWs.binaryType = "arraybuffer";
  audioWs.onopen = () => log("Audio stream connected");
  audioWs.onmessage = (e) => { if (e.data instanceof ArrayBuffer) playAudioChunkWithDetection(e.data); };
  audioWs.onclose = () => log("Audio disconnected");
}

function disconnectAudio() { if (audioWs) { audioWs.close(); audioWs = null; } }

function playAudioChunk(buf) {
  if (!audioCtx) return;
  const int16 = new Int16Array(buf);
  const float32 = new Float32Array(int16.length);
  for (let i = 0; i < int16.length; i++) float32[i] = int16[i] / 32768;
  const ab = audioCtx.createBuffer(1, float32.length, SAMPLE_RATE);
  ab.getChannelData(0).set(float32);
  const src = audioCtx.createBufferSource();
  src.buffer = ab; src.connect(audioCtx.destination);
  const now = audioCtx.currentTime;
  if (!audioStarted || nextPlayTime < now) { nextPlayTime = now + BUFFER_AHEAD; audioStarted = true; }
  if (nextPlayTime > now + 0.5) nextPlayTime = now + BUFFER_AHEAD;
  src.start(nextPlayTime); nextPlayTime += ab.duration;
  audioCount++;
}

let latencyMeasuring = false, latencySendTime = 0, latencyResults = [];
function measureLatency() {
  if (!ws || ws.readyState !== 1 || !audioCtx) { log("Connect first"); return; }
  log("Measuring..."); latencyResults = []; runLatencyTest(0);
}
function runLatencyTest(n) {
  if (n >= 5) {
    const avg = latencyResults.reduce((a,b)=>a+b,0)/latencyResults.length;
    log(`Latency: avg ${avg.toFixed(0)}ms | min ${Math.min(...latencyResults).toFixed(0)}ms | max ${Math.max(...latencyResults).toFixed(0)}ms`);
    const el = document.getElementById("latency");
    el.innerHTML = `${avg.toFixed(0)}<span class="latency-unit">ms</span>`;
    return;
  }
  latencyMeasuring = true; latencySendTime = performance.now();
  sendMidi(0x90, 60, 127);
  setTimeout(() => sendMidi(0x80, 60, 0), 100);
  setTimeout(() => { if (latencyMeasuring) { latencyMeasuring = false; runLatencyTest(n+1); } }, 500);
}
function playAudioChunkWithDetection(buf) {
  if (latencyMeasuring) {
    const int16 = new Int16Array(buf); let peak = 0;
    for (let i = 0; i < int16.length; i++) { const a = Math.abs(int16[i]); if (a > peak) peak = a; }
    if (peak > 300) {
      const ms = performance.now() - latencySendTime;
      latencyMeasuring = false; latencyResults.push(ms);
      log(`  Test ${latencyResults.length}: ${ms.toFixed(0)}ms`);
      setTimeout(() => runLatencyTest(latencyResults.length), 300);
    }
  }
  playAudioChunk(buf);
}

// ─────────────────────────────────────────────
// WebSocket + MIDI
// ─────────────────────────────────────────────
function setStatus(s) {
  const dot = document.getElementById("status-led");
  const text = document.getElementById("status");
  dot.className = "status-dot " + s;
  text.textContent = s === "connected" ? "Live" : s === "connecting" ? "Connecting" : "Offline";
}

function toggleConnection() {
  if (ws && ws.readyState === 1) { ws.close(); disconnectAudio(); return; }
  const host = document.getElementById("ws-host").value;
  initAudio(); setStatus("connecting");
  const isLocal = host.startsWith("localhost") || host.startsWith("192.168") || host.startsWith("127.0");
  ws = new WebSocket(`${isLocal ? "ws" : "wss"}://${host}`);
  ws.onopen = () => {
    setStatus("connected");
    document.getElementById("connect-btn").textContent = "Disconnect";
    document.getElementById("connect-btn").classList.add("disconnect");
    connectAudio(host); log("Connected to " + host);
  };
  ws.onmessage = (e) => {
    if (typeof e.data === "string") {
      try {
        const data = JSON.parse(e.data);
        if (data.type === "cc") {
          const knob = knobs.find(k => k.cc === data.cc);
          if (knob) setKnobValue(knob, data.value, false);
        }
      } catch(err) {}
    }
  };
  ws.onclose = () => {
    setStatus("disconnected");
    document.getElementById("connect-btn").textContent = "Connect";
    document.getElementById("connect-btn").classList.remove("disconnect");
    disconnectAudio(); nextPlayTime = 0; audioStarted = false;
  };
  ws.onerror = () => setStatus("disconnected");
}

function sendMidi(status, d1, d2) {
  if (!ws || ws.readyState !== 1) return;
  ws.send(JSON.stringify({ status, data1: d1, data2: d2 }));
  midiCount++;
}

// ─────────────────────────────────────────────
// MIDI Input
// ─────────────────────────────────────────────
async function initWebMidi() {
  if (!navigator.requestMIDIAccess) { log("Web MIDI not supported"); return; }
  try {
    midiAccess = await navigator.requestMIDIAccess({ sysex: false });
    populateMidiInputs();
    midiAccess.onstatechange = () => populateMidiInputs();
  } catch(e) { log("MIDI denied: " + e.message); }
}

function populateMidiInputs() {
  const sel = document.getElementById("midi-input");
  const cur = sel.value;
  sel.innerHTML = '<option value="">None</option>';
  for (const [id, inp] of midiAccess.inputs) {
    const o = document.createElement("option"); o.value = id; o.textContent = inp.name; sel.appendChild(o);
  }
  if (!cur && midiAccess.inputs.size > 0) { sel.value = midiAccess.inputs.keys().next().value; selectMidiInput(sel.value); }
  else if (cur) { sel.value = midiAccess.inputs.has(cur) ? cur : ""; selectMidiInput(sel.value); }
  document.getElementById("midi-input-status").textContent = midiAccess.inputs.size ? `${midiAccess.inputs.size} device(s)` : "";
}

function selectMidiInput(id) {
  if (midiAccess) for (const [, inp] of midiAccess.inputs) inp.onmidimessage = null;
  activeMidiInput = null;
  if (!id || !midiAccess) return;
  const selected = midiAccess.inputs.get(id);
  if (!selected) return;
  const base = selected.name.split(" ")[0].toLowerCase();
  for (const [, inp] of midiAccess.inputs) {
    if (inp.name.toLowerCase().startsWith(base)) { inp.onmidimessage = onMidiMessage; }
  }
  activeMidiInput = selected; log("MIDI: " + selected.name);
}
document.getElementById("midi-input").addEventListener("change", (e) => selectMidiInput(e.target.value));

function onMidiMessage(e) {
  const [status, d1, d2] = e.data;
  const type = status & 0xF0;
  const val = d2 ?? 0;

  if (type === 0xB0) {
    if (learningKnob) { finishLearn(d1); return; }
    const mapped = ccMap[d1];
    if (mapped !== undefined) {
      const knob = knobs.find(k => k.cc === mapped);
      let absVal;
      if (knob && val !== 0 && val !== 127 && val >= 57 && val <= 71 && val !== 64) {
        absVal = Math.max(0, Math.min(127, knob.value + (val - 64)));
      } else if (val === 0 || val === 127) {
        return;
      } else {
        absVal = val;
      }
      sendMidi(0xB0, mapped, absVal);
      if (knob) setKnobValue(knob, absVal, false);
    }
    return;
  }

  if (type === 0x90 || type === 0x80) {
    sendMidi(type, d1, val);
    if (type === 0x90 && val > 0) { activeNotes.add(d1); highlightKey(d1, true); }
    else { activeNotes.delete(d1); highlightKey(d1, false); }
    return;
  }

  sendMidi(type, d1, val);
}

// ─────────────────────────────────────────────
// Keyboard
// ─────────────────────────────────────────────
const NOTE_NAMES = ["C","C#","D","D#","E","F","F#","G","G#","A","A#","B"];
const BLACK_SET = new Set([1,3,6,8,10]);
let mouseNote = null;

function buildKeyboard() {
  const kb = document.getElementById("keyboard");
  kb.innerHTML = "";
  const startNote = 36;
  const octaves = 5;
  const numWhites = octaves * 7 + 1;
  const totalWidth = kb.parentElement.clientWidth;
  const containerH = kb.closest('.keyboard-surface').clientHeight - 28; // minus padding
  const whiteW = totalWidth / numWhites;
  const whiteH = Math.max(60, Math.min(containerH, whiteW * 5));
  const blackW = whiteW * 0.6;
  const blackH = whiteH * 0.58;
  const blackPositions = { 1: 1, 3: 2, 6: 4, 8: 5, 10: 6 };

  kb.style.height = whiteH + "px";

  let whiteIdx = 0;
  const whites = [0, 2, 4, 5, 7, 9, 11];

  for (let o = 0; o < octaves; o++) {
    for (const w of whites) {
      const note = startNote + o * 12 + w;
      const key = document.createElement("div");
      key.className = "key white";
      key.dataset.note = note;
      key.style.left = (whiteIdx * whiteW) + "px";
      key.style.width = (whiteW - 1) + "px";
      key.style.height = whiteH + "px";
      addKeyEvents(key, note);
      kb.appendChild(key);
      whiteIdx++;
    }
  }
  const lastNote = startNote + octaves * 12;
  const lastKey = document.createElement("div");
  lastKey.className = "key white"; lastKey.dataset.note = lastNote;
  lastKey.style.left = (whiteIdx * whiteW) + "px";
  lastKey.style.width = (whiteW - 1) + "px";
  lastKey.style.height = whiteH + "px";
  addKeyEvents(lastKey, lastNote);
  kb.appendChild(lastKey);

  for (let o = 0; o < octaves; o++) {
    for (const [noteInOct, whitePos] of Object.entries(blackPositions)) {
      const i = parseInt(noteInOct);
      const note = startNote + o * 12 + i;
      const x = (o * 7 + whitePos) * whiteW - blackW / 2;
      const key = document.createElement("div");
      key.className = "key black";
      key.dataset.note = note;
      key.style.left = x + "px";
      key.style.width = blackW + "px";
      key.style.height = blackH + "px";
      addKeyEvents(key, note);
      kb.appendChild(key);
    }
  }

  document.addEventListener("mouseup", () => { if (mouseNote !== null) { noteOff(mouseNote); mouseNote = null; }});
  document.addEventListener("touchend", () => { if (mouseNote !== null) { noteOff(mouseNote); mouseNote = null; }});
}

function addKeyEvents(key, note) {
  key.addEventListener("mousedown", (e) => { e.preventDefault(); noteOn(note); mouseNote = note; });
  key.addEventListener("mouseenter", (e) => { if (e.buttons === 1 && mouseNote !== note) { if (mouseNote !== null) noteOff(mouseNote); noteOn(note); mouseNote = note; }});
  key.addEventListener("touchstart", (e) => { e.preventDefault(); noteOn(note); mouseNote = note; });
}

window.addEventListener("resize", () => { buildKeyboard(); });

function noteOn(n) { sendMidi(0x90, n, 100); activeNotes.add(n); highlightKey(n, true); }
function noteOff(n) { sendMidi(0x80, n, 0); activeNotes.delete(n); highlightKey(n, false); }
function highlightKey(n, on) { const el = document.querySelector(`.key[data-note="${n}"]`); if (el) el.classList.toggle("active", on); }

const KEY_MAP = { a:0, w:1, s:2, e:3, d:4, f:5, t:6, g:7, y:8, h:9, u:10, j:11, k:12, o:13, l:14, p:15 };
const heldKeys = new Set();
document.addEventListener("keydown", (e) => {
  if (e.repeat || e.target.tagName === "INPUT" || e.target.tagName === "SELECT") return;
  const off = KEY_MAP[e.key.toLowerCase()]; if (off === undefined) return;
  const note = 60 + off; if (heldKeys.has(e.key)) return; heldKeys.add(e.key); noteOn(note);
});
document.addEventListener("keyup", (e) => {
  const off = KEY_MAP[e.key.toLowerCase()]; if (off === undefined) return;
  heldKeys.delete(e.key); noteOff(60 + off);
});

// ─────────────────────────────────────────────
// Program / Bank
// ─────────────────────────────────────────────
let currentBank = 0;
function changeProgram(d) {
  const el = document.getElementById("program-num");
  el.value = Math.max(0, Math.min(127, parseInt(el.value) + d));
  sendBankProgram();
}
function sendBankProgram() {
  sendMidi(0xB0, 0, currentBank);
  sendMidi(0xC0, parseInt(document.getElementById("program-num").value), 0);
}
function buildBankButtons() {
  const wrap = document.getElementById("bank-buttons");
  "ABCDEFGH".split("").forEach((l, i) => {
    const btn = document.createElement("button");
    btn.className = "bank-btn" + (i === 0 ? " active" : "");
    btn.textContent = l;
    btn.onclick = () => {
      currentBank = i;
      wrap.querySelectorAll(".bank-btn").forEach(b => b.classList.remove("active"));
      btn.classList.add("active");
      sendBankProgram();
    };
    wrap.appendChild(btn);
  });
}

// ─────────────────────────────────────────────
// Build Panel
// ─────────────────────────────────────────────
function buildPanel() {
  const panel = document.getElementById("panel");
  for (const group of PANEL) {
    const div = document.createElement("div");
    div.className = "section";
    const title = document.createElement("div");
    title.className = "section-title"; title.textContent = group.name;
    div.appendChild(title);
    const knobsDiv = document.createElement("div");
    knobsDiv.className = "section-knobs";
    for (const p of group.params) createKnob(knobsDiv, p.label, p.cc, p.def);
    div.appendChild(knobsDiv);
    panel.appendChild(div);
  }
}

// ─────────────────────────────────────────────
// Status polling
// ─────────────────────────────────────────────
setInterval(() => {
  document.getElementById("stats").textContent = `MIDI: ${midiCount} \u00b7 Audio: ${audioCount}`;
}, 500);

// ─────────────────────────────────────────────
// Log
// ─────────────────────────────────────────────
function log(msg) {
  const el = document.getElementById("log");
  const d = document.createElement("div");
  d.textContent = `${new Date().toLocaleTimeString("en-GB",{hour12:false})} ${msg}`;
  el.appendChild(d); el.scrollTop = el.scrollHeight;
  while (el.children.length > 200) el.removeChild(el.firstChild);
}

// ─────────────────────────────────────────────
// Init
// ─────────────────────────────────────────────
buildPanel();
buildKeyboard();
buildBankButtons();
initWebMidi().then(() => { loadMappings(); autoDetectController(); });
log("Ready");

const sp = new URLSearchParams(location.search);
if (sp.get("server")) document.getElementById("ws-host").value = sp.get("server");
const ah = document.getElementById("ws-host").value;
if (ah && !ah.startsWith("localhost")) setTimeout(() => toggleConnection(), 1000);

</script>
