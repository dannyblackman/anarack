<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Anarack — Remote Synth Studio</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0a0a0a; color: #e0e0e0;
      display: flex; flex-direction: column; align-items: center;
      min-height: 100vh;
    }

    /* Header */
    .header { background: #111; width: 100%; padding: 12px 20px; display: flex; align-items: center; gap: 12px; }
    .header h1 { font-size: 18px; font-weight: 700; letter-spacing: 1px; }
    .header .synth-name { font-size: 13px; color: #555; }
    .header .status { font-size: 13px; margin-left: auto; }
    .header .status.connected { color: #4ade80; }
    .header .status.disconnected { color: #f87171; }
    .header .status.connecting { color: #facc15; }
    .header .latency { font-family: "SF Mono", monospace; font-size: 16px; font-weight: 700; color: #4ade80; }

    /* Connection bar */
    .conn-bar { background: #131313; width: 100%; padding: 8px 20px; display: flex; align-items: center; gap: 12px; font-size: 13px; flex-wrap: wrap; }
    .conn-bar label { color: #777; }
    .conn-bar input[type="text"] { background: #222; color: #eee; border: 1px solid #333; border-radius: 4px; padding: 5px 8px; font-family: "SF Mono", monospace; font-size: 12px; }
    .conn-bar select { background: #222; color: #eee; border: 1px solid #333; border-radius: 4px; padding: 5px 8px; font-size: 12px; }
    .conn-bar button { background: #6366f1; color: white; border: none; border-radius: 4px; padding: 6px 18px; font-size: 12px; font-weight: 600; cursor: pointer; }
    .conn-bar button.disconnect { background: #dc2626; }
    .conn-bar .midi-status { font-size: 11px; color: #666; }

    /* Synth Panel */
    .panel { display: flex; gap: 4px; padding: 10px; flex-wrap: wrap; justify-content: center; width: 100%; }
    .group { background: #1a1a1a; padding: 10px 8px; border-radius: 6px; display: flex; flex-direction: column; align-items: center; flex: 1; min-width: 140px; }
    .group-title { font-size: 10px; font-weight: 700; color: #6366f1; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px; }
    .group-knobs { display: flex; flex-wrap: wrap; justify-content: center; gap: 6px; }

    /* Knob */
    .knob-wrap { display: flex; flex-direction: column; align-items: center; cursor: pointer; width: 72px; }
    .knob-wrap canvas { cursor: grab; }
    .knob-wrap canvas:active { cursor: grabbing; }
    .knob-label { font-size: 10px; color: #999; margin-top: 2px; }
    .knob-map { font-size: 8px; color: #6366f1; height: 12px; }
    .knob-wrap.learning .knob-map { color: #facc15; }

    /* Program bar */
    .prog-bar { background: #131313; width: 100%; padding: 5px 16px; display: flex; align-items: center; gap: 8px; font-size: 11px; }
    .prog-bar label { color: #777; font-size: 9px; font-weight: 600; }
    .prog-bar button { background: #444; color: white; border: none; border-radius: 3px; padding: 3px 8px; font-size: 12px; font-weight: 700; cursor: pointer; }
    .prog-bar input { background: #222; color: #eee; border: 1px solid #333; border-radius: 3px; padding: 2px; width: 40px; text-align: center; font-family: "SF Mono", monospace; font-size: 11px; }
    .bank-btn { background: #444 !important; color: white !important; border: none; border-radius: 3px; padding: 2px 6px; font-family: "SF Mono", monospace; font-size: 10px; font-weight: 700; cursor: pointer; margin: 0 1px; }
    .bank-btn.active { background: #6366f1 !important; }

    /* Keyboard */
    .keyboard-wrap { padding: 8px 0; width: 100%; }
    .keyboard { position: relative; user-select: none; -webkit-user-select: none; width: 100%; }
    .key { position: absolute; border-radius: 0 0 4px 4px; cursor: pointer; }
    .key.white { background: #d4d4d4; border: 1px solid #888; z-index: 1; }
    .key.black { background: #1a1a1a; border: 1px solid #000; z-index: 2; }
    .key.white.active { background: #6366f1; }
    .key.black.active { background: #6366f1; }

    /* Footer */
    .footer { width: 100%; padding: 4px 16px; display: flex; justify-content: space-between; font-size: 9px; color: #444; font-family: "SF Mono", monospace; }

    /* Log */
    #log { width: 100%; max-width: 900px; height: 80px; background: #111; border-top: 1px solid #222; padding: 4px 8px; font-family: "SF Mono", monospace; font-size: 9px; color: #555; overflow-y: auto; }
  </style>
</head>
<body>

  <!-- Header -->
  <div class="header">
    <h1>ANARACK</h1>
    <span class="synth-name">Prophet Rev2</span>
    <span class="status disconnected" id="status">Disconnected</span>
    <span class="latency" id="latency"></span>
  </div>

  <!-- Connection -->
  <div class="conn-bar">
    <label>Server</label>
    <input type="text" id="ws-host" value="play.anarack.com" style="width:220px">
    <label>MIDI In</label>
    <select id="midi-input"><option value="">None</option></select>
    <button id="connect-btn" onclick="toggleConnection()">Connect</button>
    <button onclick="measureLatency()" style="background:#333">Measure</button>
    <span class="midi-status" id="midi-input-status"></span>
  </div>

  <!-- Synth Panel -->
  <div class="panel" id="panel"></div>

  <!-- Program / Bank -->
  <div class="prog-bar">
    <label>PROGRAM</label>
    <button onclick="changeProgram(-1)"> < </button>
    <input type="number" id="program-num" value="0" min="0" max="127">
    <button onclick="changeProgram(1)"> > </button>
    <label style="margin-left:12px">BANK</label>
    <span id="bank-buttons"></span>
  </div>

  <!-- Keyboard -->
  <div class="keyboard-wrap">
    <div class="keyboard" id="keyboard"></div>
  </div>

  <!-- Footer -->
  <div class="footer">
    <span id="stats">MIDI: 0 | Audio: 0</span>
    <span id="learn-hint">Double-click knob to MIDI learn</span>
  </div>

  <!-- Log -->
  <div id="log"></div>

<script>
// ─────────────────────────────────────────────
// Rev2 Parameter Layout (matching front panel)
// ─────────────────────────────────────────────
const PANEL = [
  { name: "OSC 1", params: [
    { label: "Freq", cc: 20, def: 64 }, { label: "Fine", cc: 21, def: 64 },
    { label: "Shape", cc: 22, def: 0 }, { label: "Glide", cc: 23, def: 0 },
  ]},
  { name: "OSC 2", params: [
    { label: "Freq", cc: 24, def: 64 }, { label: "Fine", cc: 25, def: 64 },
    { label: "Shape", cc: 26, def: 0 }, { label: "Glide", cc: 27, def: 0 },
  ]},
  { name: "MIXER", params: [
    { label: "Mix", cc: 28, def: 64 }, { label: "Noise", cc: 29, def: 0 },
    { label: "Sub", cc: 8, def: 0 }, { label: "Slop", cc: 9, def: 0 },
  ]},
  { name: "FILTER", params: [
    { label: "Cutoff", cc: 102, def: 100 }, { label: "Reso", cc: 103, def: 0 },
    { label: "Key", cc: 104, def: 0 }, { label: "EnvAmt", cc: 106, def: 64 },
  ]},
  { name: "FILT ENV", params: [
    { label: "Atk", cc: 109, def: 0 }, { label: "Dec", cc: 110, def: 64 },
    { label: "Sus", cc: 111, def: 64 }, { label: "Rel", cc: 112, def: 40 },
  ]},
  { name: "AMP", params: [
    { label: "Level", cc: 113, def: 100 }, { label: "Pan", cc: 114, def: 64 },
  ]},
  { name: "AMP ENV", params: [
    { label: "Atk", cc: 118, def: 0 }, { label: "Dec", cc: 119, def: 64 },
    { label: "Sus", cc: 75, def: 100 }, { label: "Rel", cc: 76, def: 40 },
  ]},
  { name: "EFFECTS", params: [
    { label: "Mix", cc: 17, def: 0 }, { label: "P1", cc: 12, def: 64 },
    { label: "P2", cc: 13, def: 64 },
  ]},
];

// ─────────────────────────────────────────────
// State
// ─────────────────────────────────────────────
let ws = null, audioWs = null, audioCtx = null;
let midiAccess = null, activeMidiInput = null;
let activeNotes = new Set();
let nextPlayTime = 0, audioStarted = false;
const SAMPLE_RATE = 48000;
const BUFFER_AHEAD = 0.001;

// Knob state
const knobs = []; // { canvas, cc, value, label, mappedCC }
let learningKnob = null;

// CC mapping: controller CC → synth CC
let ccMap = {};
let midiCount = 0, audioCount = 0;

// ─────────────────────────────────────────────
// Knob Rendering
// ─────────────────────────────────────────────
function createKnob(parent, label, cc, defaultVal) {
  const wrap = document.createElement("div");
  wrap.className = "knob-wrap";

  const canvas = document.createElement("canvas");
  canvas.width = 60; canvas.height = 60;
  const mapLabel = document.createElement("div");
  mapLabel.className = "knob-map";
  const nameLabel = document.createElement("div");
  nameLabel.className = "knob-label";
  nameLabel.textContent = label;

  wrap.appendChild(canvas);
  wrap.appendChild(nameLabel);
  wrap.appendChild(mapLabel);
  parent.appendChild(wrap);

  const knob = { canvas, cc, value: defaultVal, label, mappedCC: null, wrap, mapLabel, dragY: null, dragVal: null };
  knobs.push(knob);

  drawKnob(knob);
  updateKnobMapLabel(knob);

  // Drag
  canvas.addEventListener("mousedown", (e) => { knob.dragY = e.clientY; knob.dragVal = knob.value; e.preventDefault(); });
  window.addEventListener("mousemove", (e) => {
    if (knob.dragY === null) return;
    const dy = knob.dragY - e.clientY;
    setKnobValue(knob, knob.dragVal + dy * 0.7, true);
  });
  window.addEventListener("mouseup", () => { knob.dragY = null; });

  // Touch
  canvas.addEventListener("touchstart", (e) => { knob.dragY = e.touches[0].clientY; knob.dragVal = knob.value; e.preventDefault(); });
  window.addEventListener("touchmove", (e) => {
    if (knob.dragY === null) return;
    const dy = knob.dragY - e.touches[0].clientY;
    setKnobValue(knob, knob.dragVal + dy * 0.7, true);
  });
  window.addEventListener("touchend", () => { knob.dragY = null; });

  // Scroll
  canvas.addEventListener("wheel", (e) => { e.preventDefault(); setKnobValue(knob, knob.value + (e.deltaY < 0 ? 1 : -1), true); });

  // Double-click = MIDI learn
  wrap.addEventListener("dblclick", (e) => { e.preventDefault(); startLearn(knob); });

  return knob;
}

function drawKnob(knob, learning = false) {
  const ctx = knob.canvas.getContext("2d");
  const w = 60, cx = w/2, cy = w/2, r = 24;
  ctx.clearRect(0, 0, w, w);

  const startAng = (225 * Math.PI) / 180;
  const sweep = (270 * Math.PI) / 180;
  const valAng = (knob.value / 127) * sweep;

  // Track
  ctx.beginPath();
  ctx.arc(cx, cy, r, -startAng, -startAng + sweep);
  ctx.strokeStyle = "#333"; ctx.lineWidth = 2; ctx.stroke();

  // Value arc
  ctx.beginPath();
  ctx.arc(cx, cy, r, -startAng, -startAng + valAng);
  ctx.strokeStyle = learning ? "#facc15" : "#6366f1"; ctx.lineWidth = 2.5; ctx.stroke();

  // Body
  ctx.beginPath();
  ctx.arc(cx, cy, r - 4, 0, Math.PI * 2);
  ctx.fillStyle = learning ? "#33351a" : "#2a2a2a"; ctx.fill();
  ctx.strokeStyle = "#444"; ctx.lineWidth = 0.5; ctx.stroke();

  // Indicator
  const ang = -startAng + valAng;
  const il = r - 5;
  ctx.beginPath();
  ctx.moveTo(cx, cy);
  ctx.lineTo(cx + Math.cos(ang) * il, cy + Math.sin(ang) * il);
  ctx.strokeStyle = "white"; ctx.lineWidth = 2; ctx.stroke();

  // Value text
  ctx.fillStyle = "#777"; ctx.font = "9px monospace"; ctx.textAlign = "center"; ctx.textBaseline = "middle";
  ctx.fillText(knob.value, cx, cy);
}

function setKnobValue(knob, val, send) {
  knob.value = Math.max(0, Math.min(127, Math.round(val)));
  drawKnob(knob, knob === learningKnob);
  if (send) sendMidi(0xB0, knob.cc, knob.value);
}

function updateKnobMapLabel(knob) {
  const controllerCC = Object.entries(ccMap).find(([k, v]) => v === knob.cc);
  if (controllerCC) {
    knob.mapLabel.textContent = `← CC${controllerCC[0]}`;
    knob.mapLabel.style.color = "#6366f1";
    knob.mappedCC = parseInt(controllerCC[0]);
  } else {
    knob.mapLabel.textContent = "dbl-click";
    knob.mapLabel.style.color = "#444";
    knob.mappedCC = null;
  }
}

// ─────────────────────────────────────────────
// MIDI Learn
// ─────────────────────────────────────────────
function startLearn(knob) {
  if (learningKnob === knob) { learningKnob = null; drawKnob(knob); setLearnHint("Double-click knob to MIDI learn"); return; }
  if (learningKnob) drawKnob(learningKnob);
  learningKnob = knob;
  drawKnob(knob, true);
  knob.wrap.classList.add("learning");
  setLearnHint(`Twiddle a knob for ${knob.label}...`);
}

function finishLearn(controllerCC) {
  if (!learningKnob) return false;
  const synthCC = learningKnob.cc;

  // Remove old mappings
  for (const [k, v] of Object.entries(ccMap)) { if (v === synthCC) delete ccMap[k]; }
  delete ccMap[controllerCC];

  ccMap[controllerCC] = synthCC;
  saveMappings();

  setLearnHint(`Mapped CC${controllerCC} → ${learningKnob.label} (CC${synthCC})`);
  learningKnob.wrap.classList.remove("learning");
  drawKnob(learningKnob);
  learningKnob = null;
  knobs.forEach(k => updateKnobMapLabel(k));
  return true;
}

function setLearnHint(text) { document.getElementById("learn-hint").textContent = text; }

function loadMappings() {
  try { const s = localStorage.getItem("anarack_cc_map"); if (s) ccMap = JSON.parse(s); } catch(e) {}
  knobs.forEach(k => updateKnobMapLabel(k));
}

function saveMappings() { localStorage.setItem("anarack_cc_map", JSON.stringify(ccMap)); }

function autoDetectController() {
  if (!midiAccess || Object.keys(ccMap).length > 0) return;
  const profiles = {
    "launchkey": { 21: 102, 22: 103, 23: 22, 24: 28, 25: 118, 26: 119, 27: 75, 28: 76 },
    "mpk": { 70: 102, 71: 103, 72: 22, 73: 28, 74: 118, 75: 119, 76: 75, 77: 76 },
    "keylab": { 74: 102, 71: 103, 18: 22, 19: 28, 16: 118, 17: 119, 91: 75, 79: 76 },
  };
  for (const [, input] of midiAccess.inputs) {
    const name = (input.name || "").toLowerCase();
    for (const [key, map] of Object.entries(profiles)) {
      if (name.includes(key)) { ccMap = { ...map }; saveMappings(); knobs.forEach(k => updateKnobMapLabel(k)); log(`Auto-mapped ${key}`); return; }
    }
  }
}

// ─────────────────────────────────────────────
// Audio
// ─────────────────────────────────────────────
function initAudio() {
  if (audioCtx) return;
  audioCtx = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: SAMPLE_RATE, latencyHint: "interactive" });
  log(`Audio: ${audioCtx.sampleRate}Hz, base ${((audioCtx.baseLatency||0)*1000).toFixed(0)}ms`);
}

function connectAudio(host) {
  const isLocal = host.startsWith("localhost") || host.startsWith("192.168") || host.startsWith("127.0");
  audioWs = new WebSocket(`${isLocal ? "ws" : "wss"}://${host}/audio`);
  audioWs.binaryType = "arraybuffer";
  audioWs.onopen = () => log("Audio stream connected");
  audioWs.onmessage = (e) => { if (e.data instanceof ArrayBuffer) playAudioChunkWithDetection(e.data); };
  audioWs.onclose = () => log("Audio disconnected");
}

function disconnectAudio() { if (audioWs) { audioWs.close(); audioWs = null; } }

function playAudioChunk(buf) {
  if (!audioCtx) return;
  const int16 = new Int16Array(buf);
  const float32 = new Float32Array(int16.length);
  for (let i = 0; i < int16.length; i++) float32[i] = int16[i] / 32768;
  const ab = audioCtx.createBuffer(1, float32.length, SAMPLE_RATE);
  ab.getChannelData(0).set(float32);
  const src = audioCtx.createBufferSource();
  src.buffer = ab; src.connect(audioCtx.destination);
  const now = audioCtx.currentTime;
  if (!audioStarted || nextPlayTime < now) { nextPlayTime = now + BUFFER_AHEAD; audioStarted = true; }
  if (nextPlayTime > now + 0.5) nextPlayTime = now + BUFFER_AHEAD;
  src.start(nextPlayTime); nextPlayTime += ab.duration;
  audioCount++;
}

// Latency measurement
let latencyMeasuring = false, latencySendTime = 0, latencyResults = [];
function measureLatency() {
  if (!ws || ws.readyState !== 1 || !audioCtx) { log("Connect first"); return; }
  log("Measuring..."); latencyResults = []; runLatencyTest(0);
}
function runLatencyTest(n) {
  if (n >= 5) {
    const avg = latencyResults.reduce((a,b)=>a+b,0)/latencyResults.length;
    log(`Latency: avg ${avg.toFixed(0)}ms | min ${Math.min(...latencyResults).toFixed(0)}ms | max ${Math.max(...latencyResults).toFixed(0)}ms (${latencyResults.length} samples)`);
    document.getElementById("latency").textContent = `${avg.toFixed(0)}ms`;
    return;
  }
  latencyMeasuring = true; latencySendTime = performance.now();
  sendMidi(0x90, 60, 127);
  setTimeout(() => sendMidi(0x80, 60, 0), 100);
  setTimeout(() => { if (latencyMeasuring) { latencyMeasuring = false; runLatencyTest(n+1); } }, 500);
}
function playAudioChunkWithDetection(buf) {
  if (latencyMeasuring) {
    const int16 = new Int16Array(buf); let peak = 0;
    for (let i = 0; i < int16.length; i++) { const a = Math.abs(int16[i]); if (a > peak) peak = a; }
    if (peak > 300) {
      const ms = performance.now() - latencySendTime;
      latencyMeasuring = false; latencyResults.push(ms);
      log(`  Test ${latencyResults.length}: ${ms.toFixed(0)}ms`);
      setTimeout(() => runLatencyTest(latencyResults.length), 300);
    }
  }
  playAudioChunk(buf);
}

// ─────────────────────────────────────────────
// WebSocket + MIDI
// ─────────────────────────────────────────────
function setStatus(s) {
  const el = document.getElementById("status");
  el.className = "status " + s;
  el.textContent = s === "connected" ? "Connected" : s === "connecting" ? "Connecting..." : "Disconnected";
}

function toggleConnection() {
  if (ws && ws.readyState === 1) { ws.close(); disconnectAudio(); return; }
  const host = document.getElementById("ws-host").value;
  initAudio(); setStatus("connecting");
  const isLocal = host.startsWith("localhost") || host.startsWith("192.168") || host.startsWith("127.0");
  ws = new WebSocket(`${isLocal ? "ws" : "wss"}://${host}`);
  ws.onopen = () => {
    setStatus("connected");
    document.getElementById("connect-btn").textContent = "Disconnect";
    document.getElementById("connect-btn").classList.add("disconnect");
    connectAudio(host); log("Connected to " + host);
  };
  ws.onmessage = (e) => {
    if (typeof e.data === "string") {
      try {
        const data = JSON.parse(e.data);
        if (data.type === "cc") {
          const knob = knobs.find(k => k.cc === data.cc);
          if (knob) setKnobValue(knob, data.value, false);
        }
      } catch(err) {}
    }
  };
  ws.onclose = () => {
    setStatus("disconnected");
    document.getElementById("connect-btn").textContent = "Connect";
    document.getElementById("connect-btn").classList.remove("disconnect");
    disconnectAudio(); nextPlayTime = 0; audioStarted = false;
  };
  ws.onerror = () => setStatus("disconnected");
}

function sendMidi(status, d1, d2) {
  if (!ws || ws.readyState !== 1) return;
  ws.send(JSON.stringify({ status, data1: d1, data2: d2 }));
  midiCount++;
}

// ─────────────────────────────────────────────
// MIDI Input
// ─────────────────────────────────────────────
async function initWebMidi() {
  if (!navigator.requestMIDIAccess) { log("Web MIDI not supported"); return; }
  try {
    midiAccess = await navigator.requestMIDIAccess({ sysex: false });
    populateMidiInputs();
    midiAccess.onstatechange = () => populateMidiInputs();
  } catch(e) { log("MIDI denied: " + e.message); }
}

function populateMidiInputs() {
  const sel = document.getElementById("midi-input");
  const cur = sel.value;
  sel.innerHTML = '<option value="">None</option>';
  for (const [id, inp] of midiAccess.inputs) {
    const o = document.createElement("option"); o.value = id; o.textContent = inp.name; sel.appendChild(o);
  }
  if (!cur && midiAccess.inputs.size > 0) { sel.value = midiAccess.inputs.keys().next().value; selectMidiInput(sel.value); }
  else if (cur) { sel.value = midiAccess.inputs.has(cur) ? cur : ""; selectMidiInput(sel.value); }
  document.getElementById("midi-input-status").textContent = midiAccess.inputs.size ? `${midiAccess.inputs.size} device(s)` : "";
}

function selectMidiInput(id) {
  if (midiAccess) for (const [, inp] of midiAccess.inputs) inp.onmidimessage = null;
  activeMidiInput = null;
  if (!id || !midiAccess) return;
  const selected = midiAccess.inputs.get(id);
  if (!selected) return;
  const base = selected.name.split(" ")[0].toLowerCase();
  for (const [, inp] of midiAccess.inputs) {
    if (inp.name.toLowerCase().startsWith(base)) { inp.onmidimessage = onMidiMessage; }
  }
  activeMidiInput = selected; log("MIDI: " + selected.name);
}
document.getElementById("midi-input").addEventListener("change", (e) => selectMidiInput(e.target.value));

function onMidiMessage(e) {
  const [status, d1, d2] = e.data;
  const type = status & 0xF0;
  const val = d2 ?? 0;

  if (type === 0xB0) {
    if (learningKnob) { finishLearn(d1); return; }
    const mapped = ccMap[d1];
    if (mapped !== undefined) {
      sendMidi(0xB0, mapped, val);
      const knob = knobs.find(k => k.cc === mapped);
      if (knob) setKnobValue(knob, val, false);
    }
    return;
  }

  // Notes → channel 1
  if (type === 0x90 || type === 0x80) {
    sendMidi(type, d1, val);
    if (type === 0x90 && val > 0) { activeNotes.add(d1); highlightKey(d1, true); }
    else { activeNotes.delete(d1); highlightKey(d1, false); }
    return;
  }

  sendMidi(type, d1, val);
}

// ─────────────────────────────────────────────
// Keyboard
// ─────────────────────────────────────────────
const NOTE_NAMES = ["C","C#","D","D#","E","F","F#","G","G#","A","A#","B"];
const BLACK_SET = new Set([1,3,6,8,10]);
let mouseNote = null;

function buildKeyboard() {
  const kb = document.getElementById("keyboard");
  kb.innerHTML = "";
  const startNote = 36; // C2
  const octaves = 5;
  const numWhites = octaves * 7 + 1;
  const totalWidth = kb.parentElement.clientWidth;
  const whiteW = totalWidth / numWhites;
  const whiteH = whiteW * 4;
  const blackW = whiteW * 0.65;
  const blackH = whiteH * 0.6;
  // Black key positions: note-in-octave → which white key it sits between (as fraction)
  // C#=between 0-1, D#=between 1-2, F#=between 3-4, G#=between 4-5, A#=between 5-6
  const blackPositions = { 1: 1, 3: 2, 6: 4, 8: 5, 10: 6 };

  kb.style.height = whiteH + "px";

  let whiteIdx = 0;
  const whites = [0, 2, 4, 5, 7, 9, 11];

  // White keys first
  for (let o = 0; o < octaves; o++) {
    for (const w of whites) {
      const note = startNote + o * 12 + w;
      const key = document.createElement("div");
      key.className = "key white";
      key.dataset.note = note;
      key.style.left = (whiteIdx * whiteW) + "px";
      key.style.width = (whiteW - 1) + "px";
      key.style.height = whiteH + "px";
      addKeyEvents(key, note);
      kb.appendChild(key);
      whiteIdx++;
    }
  }
  // Final C
  const lastNote = startNote + octaves * 12;
  const lastKey = document.createElement("div");
  lastKey.className = "key white"; lastKey.dataset.note = lastNote;
  lastKey.style.left = (whiteIdx * whiteW) + "px";
  lastKey.style.width = (whiteW - 1) + "px";
  lastKey.style.height = whiteH + "px";
  addKeyEvents(lastKey, lastNote);
  kb.appendChild(lastKey);

  // Black keys
  for (let o = 0; o < octaves; o++) {
    for (const [noteInOct, whitePos] of Object.entries(blackPositions)) {
      const i = parseInt(noteInOct);
      const note = startNote + o * 12 + i;
      const x = (o * 7 + whitePos) * whiteW - blackW / 2;
      const key = document.createElement("div");
      key.className = "key black";
      key.dataset.note = note;
      key.style.left = x + "px";
      key.style.width = blackW + "px";
      key.style.height = blackH + "px";
      addKeyEvents(key, note);
      kb.appendChild(key);
    }
  }

  document.addEventListener("mouseup", () => { if (mouseNote !== null) { noteOff(mouseNote); mouseNote = null; }});
  document.addEventListener("touchend", () => { if (mouseNote !== null) { noteOff(mouseNote); mouseNote = null; }});
}

function addKeyEvents(key, note) {
  key.addEventListener("mousedown", (e) => { e.preventDefault(); noteOn(note); mouseNote = note; });
  key.addEventListener("mouseenter", (e) => { if (e.buttons === 1 && mouseNote !== note) { if (mouseNote !== null) noteOff(mouseNote); noteOn(note); mouseNote = note; }});
  key.addEventListener("touchstart", (e) => { e.preventDefault(); noteOn(note); mouseNote = note; });
}

// Rebuild keyboard on resize
window.addEventListener("resize", () => { buildKeyboard(); });

function noteOn(n) { sendMidi(0x90, n, 100); activeNotes.add(n); highlightKey(n, true); }
function noteOff(n) { sendMidi(0x80, n, 0); activeNotes.delete(n); highlightKey(n, false); }
function highlightKey(n, on) { const el = document.querySelector(`.key[data-note="${n}"]`); if (el) el.classList.toggle("active", on); }

// Computer keyboard fallback
const KEY_MAP = { a:0, w:1, s:2, e:3, d:4, f:5, t:6, g:7, y:8, h:9, u:10, j:11, k:12, o:13, l:14, p:15 };
const heldKeys = new Set();
document.addEventListener("keydown", (e) => {
  if (e.repeat || e.target.tagName === "INPUT" || e.target.tagName === "SELECT") return;
  const off = KEY_MAP[e.key.toLowerCase()]; if (off === undefined) return;
  const note = 60 + off; if (heldKeys.has(e.key)) return; heldKeys.add(e.key); noteOn(note);
});
document.addEventListener("keyup", (e) => {
  const off = KEY_MAP[e.key.toLowerCase()]; if (off === undefined) return;
  heldKeys.delete(e.key); noteOff(60 + off);
});

// ─────────────────────────────────────────────
// Program / Bank
// ─────────────────────────────────────────────
let currentBank = 0;
function changeProgram(d) {
  const el = document.getElementById("program-num");
  el.value = Math.max(0, Math.min(127, parseInt(el.value) + d));
  sendBankProgram();
}
function sendBankProgram() {
  sendMidi(0xB0, 0, currentBank);
  sendMidi(0xC0, parseInt(document.getElementById("program-num").value), 0);
}
function buildBankButtons() {
  const wrap = document.getElementById("bank-buttons");
  "ABCDEFGH".split("").forEach((l, i) => {
    const btn = document.createElement("button");
    btn.className = "bank-btn" + (i === 0 ? " active" : "");
    btn.textContent = l;
    btn.onclick = () => {
      currentBank = i;
      wrap.querySelectorAll(".bank-btn").forEach(b => b.classList.remove("active"));
      btn.classList.add("active");
      sendBankProgram();
    };
    wrap.appendChild(btn);
  });
}

// ─────────────────────────────────────────────
// Build Panel
// ─────────────────────────────────────────────
function buildPanel() {
  const panel = document.getElementById("panel");
  for (const group of PANEL) {
    const div = document.createElement("div");
    div.className = "group";
    const title = document.createElement("div");
    title.className = "group-title"; title.textContent = group.name;
    div.appendChild(title);
    const knobsDiv = document.createElement("div");
    knobsDiv.className = "group-knobs";
    for (const p of group.params) createKnob(knobsDiv, p.label, p.cc, p.def);
    div.appendChild(knobsDiv);
    panel.appendChild(div);
  }
}

// ─────────────────────────────────────────────
// Status polling
// ─────────────────────────────────────────────
setInterval(() => {
  document.getElementById("stats").textContent = `MIDI: ${midiCount} | Audio: ${audioCount}`;
}, 500);

// ─────────────────────────────────────────────
// Log
// ─────────────────────────────────────────────
function log(msg) {
  const el = document.getElementById("log");
  const d = document.createElement("div");
  d.textContent = `[${new Date().toLocaleTimeString("en-GB",{hour12:false})}] ${msg}`;
  el.appendChild(d); el.scrollTop = el.scrollHeight;
  while (el.children.length > 200) el.removeChild(el.firstChild);
}

// ─────────────────────────────────────────────
// Init
// ─────────────────────────────────────────────
buildPanel();
buildKeyboard();
buildBankButtons();
initWebMidi().then(() => { loadMappings(); autoDetectController(); });
log("Ready. Use computer keys (A-L) or connect a MIDI controller.");
log("Double-click any knob to MIDI learn.");

// URL param + auto-connect
const sp = new URLSearchParams(location.search);
if (sp.get("server")) document.getElementById("ws-host").value = sp.get("server");
const ah = document.getElementById("ws-host").value;
if (ah && !ah.startsWith("localhost")) setTimeout(() => toggleConnection(), 1000);

</script>
