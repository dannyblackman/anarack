<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Prophet Rev2 — Anarack</title>
<style>
  /* Fonts: loaded from Google Fonts in browser, falls back to system fonts in plugin WebView */
  @import url('https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Inter:wght@400;500;600;700&display=swap');

  :root {
    --bg: #1a1a1a;
    --panel: #1e1e1e;
    --border: rgba(255,255,255,0.4);
    --text: #fff;
    --accent: #E53935;
    --btn-off: #333;
    --btn-border: #555;
    --led-off: #333;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; overflow: hidden; }
  body { background: #111; color: var(--text); font-family: 'Inter', -apple-system, sans-serif; font-size: 12px; }

  .panel {
    background: var(--panel);
    padding: 20px 24px;
    display: flex; flex-direction: column;
    border-radius: 10px;
  }

  /* Connection controls (right side of header) */
  .topbar-controls {
    display: flex; align-items: center; gap: 14px; margin-left: auto;
  }
  .conn-group {
    display: flex; align-items: center; gap: 6px;
  }
  .conn-label {
    font-size: 9px; font-weight: 600; color: rgba(255,255,255,0.3);
    text-transform: uppercase; letter-spacing: 2px; flex-shrink: 0;
  }
  .conn-input {
    background: rgba(255,255,255,0.05); color: #fff;
    border: 1px solid rgba(255,255,255,0.12); padding: 5px 10px;
    font-family: 'Inter', sans-serif; font-size: 11px; font-weight: 400;
    border-radius: 3px; outline: none; transition: border-color 0.2s;
  }
  .conn-input:focus { border-color: #E8A849; }
  .conn-select {
    background: rgba(255,255,255,0.05); color: #fff;
    border: 1px solid rgba(255,255,255,0.12); padding: 5px 10px;
    font-family: 'Inter', sans-serif; font-size: 11px;
    border-radius: 3px; outline: none; appearance: auto;
  }
  .conn-select option { background: #1e1e1e; color: #fff; }
  .midi-status {
    font-size: 9px; color: rgba(255,255,255,0.25);
  }
  .conn-btn {
    background: #E8A849; color: #111; border: none;
    padding: 5px 16px; font-family: 'Inter', sans-serif;
    font-size: 10px; font-weight: 700; text-transform: uppercase;
    letter-spacing: 1.5px; border-radius: 3px;
    cursor: pointer; transition: all 0.15s; flex-shrink: 0;
  }
  .conn-btn:hover { filter: brightness(1.1); }
  .conn-btn.disconnect { background: #E85454; color: #fff; }
  .conn-btn.secondary {
    background: rgba(255,255,255,0.06); color: rgba(255,255,255,0.4);
    border: 1px solid rgba(255,255,255,0.1);
  }
  .conn-btn.secondary:hover { color: #fff; background: rgba(255,255,255,0.1); }

  /* Status bar (below topbar controls) */
  .statusbar {
    display: flex; align-items: center; gap: 14px;
    padding: 0 0 10px; flex-shrink: 0;
  }
  .status-pill {
    display: flex; align-items: center; gap: 6px;
    padding: 3px 10px; border-radius: 20px;
    background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.06);
  }
  .status-dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: rgba(255,255,255,0.15); transition: all 0.3s;
  }
  .status-dot.live { background: #5BDB7E; box-shadow: 0 0 8px rgba(91,219,126,0.5); }
  .status-dot.connecting { background: #E8A849; box-shadow: 0 0 8px rgba(232,168,73,0.4); animation: pulse 1.5s infinite; }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }
  .status-label {
    font-size: 9px; font-weight: 600; color: rgba(255,255,255,0.3);
    text-transform: uppercase; letter-spacing: 1.5px;
  }
  .status-pill.live .status-label { color: #5BDB7E; }
  .stat-group {
    display: flex; align-items: baseline; gap: 3px;
  }
  .stat-val {
    font-family: 'Inter', sans-serif; font-size: 9px; font-weight: 600;
    color: #5BDB7E; letter-spacing: 1px;
  }
  .stat-unit {
    font-size: 9px; font-weight: 500; color: rgba(255,255,255,0.25);
  }
  .stat-val.dim { color: rgba(255,255,255,0.15); }
  .conn-mode {
    font-size: 9px; font-weight: 600; color: rgba(255,255,255,0.3);
    text-transform: uppercase; letter-spacing: 1.5px;
  }

  /* Header */
  .header {
    display: flex; align-items: center; gap: 14px;
    margin-bottom: 20px; padding-bottom: 10px;
    border-bottom: 1px solid rgba(255,255,255,0.15);
    flex-shrink: 0; position: relative;
  }
  .logo { font-family: 'Syne', sans-serif; font-size: 36px; font-weight: 800; color: #fff; letter-spacing: 8px; text-transform: uppercase; }
  .logo span { color: transparent; -webkit-text-stroke: 1.5px #fff; }

  /* Main layout: misc sidebar + rows */
  .main { display: flex; gap: 20px; align-items: stretch; }
  .rows-col { display: flex; flex-direction: column; gap: 20px; }

  /* Misc sidebar */
  .misc-col {
    width: 130px; flex-shrink: 0;
    display: flex; flex-direction: column;
    align-items: center;
    justify-content: space-evenly;
    padding: 10px 0;
  }
  .misc-ctrl { display: flex; flex-direction: column; align-items: center; }

  /* Rows */
  .row { display: flex; gap: 20px; align-items: stretch; flex-shrink: 0; }

  /* Section */
  .section {
    border: 2px solid var(--border);
    border-radius: 10px;
    padding: 22px 12px 12px;
    position: relative;
    flex-shrink: 0;
  }
  .section-label {
    position: absolute; top: -9px; left: 50%; transform: translateX(-50%);
    background: var(--panel); padding: 0 10px;
    font-size: 10px; font-weight: 700; color: #fff;
    text-transform: uppercase; letter-spacing: 1.5px; white-space: nowrap;
  }
  .section-row { display: flex; align-items: flex-start; gap: 8px; min-height: 68px; }
  .section-rows { display: flex; flex-direction: column; gap: 20px; }

  /* Knob control */
  .ctrl { display: flex; flex-direction: column; align-items: center; width: 66px; }
  .ctrl canvas { cursor: grab; }
  .ctrl canvas:active { cursor: grabbing; }
  .ctrl-label {
    font-size: 8.5px; font-weight: 600; color: var(--text);
    text-align: center; margin-top: 2px;
    text-transform: uppercase; letter-spacing: 0.5px;
    line-height: 1.2;
  }

  /* Button (toggle) */
  .ctrl-btn { display: flex; flex-direction: column; align-items: center; width: 66px; padding-top: 8px; }
  .btn {
    width: 42px; height: 24px; border-radius: 3px;
    background: var(--btn-off); border: 1px solid var(--btn-border);
    display: flex; align-items: center; justify-content: center;
    font-size: 8px; font-weight: 700; color: rgba(255,255,255,0.4);
    cursor: pointer; transition: all 0.08s; text-transform: uppercase;
    user-select: none;
  }
  .btn.on { background: var(--accent); border-color: var(--accent); color: #fff; box-shadow: 0 0 8px rgba(229,57,53,0.4); }
  .ctrl-btn .ctrl-label { margin-top: 4px; }

  /* Small button variant */
  .btn-sm {
    min-width: 22px; height: 20px; padding: 0 4px; border-radius: 3px;
    background: var(--btn-off); border: 1px solid var(--btn-border);
    display: flex; align-items: center; justify-content: center;
    font-size: 8px; font-weight: 700; color: rgba(255,255,255,0.4);
    cursor: pointer; transition: all 0.08s; user-select: none; flex-shrink: 0;
  }
  .btn-sm.on { background: var(--accent); border-color: var(--accent); color: #fff; box-shadow: 0 0 6px rgba(229,57,53,0.4); }

  /* Shape selector (LED list) */
  .shape-sel {
    display: flex; flex-direction: column; gap: 2px;
    padding: 2px 4px; cursor: pointer; user-select: none;
    width: 76px;
  }
  .shape-opt {
    display: flex; align-items: center; gap: 5px;
    font-size: 8px; color: rgba(255,255,255,0.3);
    text-transform: uppercase; letter-spacing: 0.3px;
    padding: 1px 2px;
  }
  .shape-opt.active { color: #fff; }
  .shape-led {
    width: 7px; height: 3px; border-radius: 1px;
    background: var(--led-off); flex-shrink: 0;
  }
  .shape-opt.active .shape-led { background: var(--accent); box-shadow: 0 0 4px rgba(229,57,53,0.6); }

  /* LFO tab buttons */
  .lfo-tab {
    width: 28px; height: 22px; border-radius: 4px;
    background: #2a2a2a; border: 1px solid #444;
    display: flex; align-items: center; justify-content: center;
    font-size: 10px; font-weight: 700; color: rgba(255,255,255,0.4);
    cursor: pointer; user-select: none; transition: all 0.08s;
  }
  .lfo-tab.active { background: var(--accent); border-color: var(--accent); color: #fff; box-shadow: 0 0 6px rgba(229,57,53,0.3); }

  /* Programs section */
  .prog-grid { display: grid; grid-template-columns: auto auto; gap: 6px 0; justify-content: center; }
  .prog-grid .ctrl-btn { width: auto; padding: 4px 4px 0; }
  .prog-btn {
    padding: 8px 12px; border-radius: 6px;
    background: #2a2a2a; border: 1px solid #444;
    font-size: 8px; font-weight: 600; color: rgba(255,255,255,0.5);
    cursor: pointer; text-align: center;
    user-select: none; transition: all 0.08s; white-space: nowrap;
  }
  .prog-btn:hover { background: #333; }
  .prog-btn.on { background: var(--accent); border-color: var(--accent); color: #fff; box-shadow: 0 0 6px rgba(229,57,53,0.4); }

  /* Patch screen — OLED look */
  .patch-screen {
    width: 150px; height: 86px;
    background: #000; border: 2px solid #222; border-radius: 4px;
    padding: 8px 10px;
    display: flex; flex-direction: column; justify-content: space-between;
    font-family: 'Inter', monospace;
    box-shadow: inset 0 0 12px rgba(0,0,0,0.8), 0 0 1px rgba(255,255,255,0.1);
    position: relative;
    overflow: hidden;
  }
  .patch-screen::before {
    content: '';
    position: absolute; inset: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(255,255,255,0.015) 2px,
      rgba(255,255,255,0.015) 3px
    );
    pointer-events: none;
  }
  .patch-screen::after {
    content: '';
    position: absolute; inset: 0;
    background: radial-gradient(ellipse at center, transparent 50%, rgba(0,0,0,0.4) 100%);
    pointer-events: none;
  }
  .patch-header { display: flex; justify-content: space-between; align-items: baseline; position: relative; z-index: 1; }
  .patch-loc { font-size: 11px; font-weight: 700; color: #fff; text-shadow: 0 0 4px rgba(255,255,255,0.5); }
  .patch-bpm { font-size: 9px; color: rgba(255,255,255,0.5); }
  .patch-name { font-size: 10px; font-weight: 600; color: #fff; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; position: relative; z-index: 1; text-shadow: 0 0 4px rgba(255,255,255,0.4); }
  .patch-param { display: flex; justify-content: space-between; align-items: baseline; position: relative; z-index: 1; }
  .patch-param-name { font-size: 8px; color: rgba(255,255,255,0.4); text-transform: uppercase; }
  .patch-param-val { font-size: 14px; font-weight: 700; color: #fff; text-shadow: 0 0 6px rgba(255,255,255,0.5); }

  /* Transpose */
  .transpose-row { display: flex; gap: 2px; align-items: center; justify-content: center; }
  .transpose-label { font-size: 8px; font-weight: 600; color: var(--text); text-transform: uppercase; letter-spacing: 0.5px; text-align: center; margin-top: 4px; }

  /* Vertical divider */
  .vdiv { width: 1px; background: rgba(255,255,255,0.15); margin: 0 6px; align-self: stretch; }

  /* Footer */
  .footer {
    display: flex; align-items: center; justify-content: flex-end;
    padding: 8px 0 0; margin-top: 12px;
    border-top: 1px solid rgba(255,255,255,0.08);
    flex-shrink: 0; gap: 16px;
  }
  .footer-toggle {
    font-size: 9px; font-weight: 600; color: rgba(255,255,255,0.2);
    text-transform: uppercase; letter-spacing: 1.5px;
    cursor: pointer; user-select: none;
  }
  .footer-toggle:hover { color: rgba(255,255,255,0.4); }

  /* Log — fixed bottom-right */
  #log-wrapper {
    position: fixed; bottom: 12px; right: 12px;
    z-index: 100; display: flex; flex-direction: column; align-items: flex-end;
  }
  #log {
    display: none; width: 320px;
    height: 120px; background: rgba(0,0,0,0.9);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 6px; padding: 8px 10px;
    margin-bottom: 4px;
    font-family: 'Inter', monospace; font-size: 9px; font-weight: 400;
    color: rgba(255,255,255,0.2);
    overflow-y: auto; line-height: 1.6;
    backdrop-filter: blur(8px);
  }
  #log.visible { display: block; }
  #log div { opacity: 0.6; }
  #log div:last-child { opacity: 1; color: rgba(255,255,255,0.4); }
</style>
</head>
<body>

<div class="panel" id="panel">
  <div class="header">
    <div class="logo">PROPHET <span>REV2</span></div>
    <div class="status-pill" id="status-pill">
      <div class="status-dot" id="status-dot"></div>
      <span class="status-label" id="status-label">Offline</span>
    </div>
    <span class="conn-mode" id="conn-mode"></span>
    <div class="stat-group" id="rtt-group" style="display:none">
      <span class="stat-val" id="rtt-val">—</span>
      <span class="stat-unit">ms RTT</span>
    </div>
    <div class="stat-group" id="buf-group" style="display:none">
      <span class="stat-val dim" id="buf-val">—</span>
      <span class="stat-unit">ms buf</span>
    </div>
    <div class="topbar-controls">
      <button class="conn-btn" id="connect-btn" onclick="toggleConnect()">Connect</button>
      <button class="conn-btn secondary" id="advanced-toggle" onclick="toggleAdvanced()">&#9881;</button>
    </div>
    <!-- Advanced panel (hidden by default) -->
    <div id="advanced-panel" style="display:none;position:absolute;right:24px;top:52px;z-index:50;background:rgba(0,0,0,0.92);border:1px solid rgba(255,255,255,0.1);border-radius:6px;padding:12px 16px;backdrop-filter:blur(8px);display:none;">
      <div style="display:flex;flex-direction:column;gap:10px;">
        <div class="conn-group">
          <span class="conn-label">Server</span>
          <input class="conn-input" type="text" id="server-host" value="play.anarack.com" style="width:170px">
        </div>
        <div class="conn-group">
          <label style="display:flex;align-items:center;gap:4px;cursor:pointer;">
            <input type="checkbox" id="lan-mode" style="accent-color:#E8A849;">
            <span style="font-size:8px;color:rgba(255,255,255,0.3);text-transform:uppercase;letter-spacing:1px;">LAN mode (direct connection, no WireGuard)</span>
          </label>
        </div>
        <div class="conn-group">
          <button class="conn-btn secondary" onclick="doPing()" style="width:100%;">Ping</button>
        </div>
      </div>
    </div>
  </div>

  <div class="main">
    <!-- Misc sidebar (no border, spans both rows) -->
    <div class="misc-col" id="misc-col"></div>

    <div class="rows-col">
      <div class="row" id="row1"></div>
      <div class="row" id="row2"></div>
    </div>
  </div>

  <div id="log"></div>
  <div class="footer">
    <span class="footer-toggle" onclick="document.getElementById('log').classList.toggle('visible')">Log</span>
  </div>
</div>

<script>
const DPR = window.devicePixelRatio || 1;
const KS = 50;
const ACCENT = '#E53935';

// ── Knob Drawing ──
// center: if provided (0-1 normalized), draws arc from center outward (bipolar)
function drawKnob(canvas, value, max, center) {
  canvas.width = KS * DPR; canvas.height = KS * DPR;
  canvas.style.width = KS + 'px'; canvas.style.height = KS + 'px';
  const ctx = canvas.getContext('2d');
  ctx.scale(DPR, DPR);
  const cx = KS/2, cy = KS/2, r = KS/2 - 8;
  const startA = 0.75 * Math.PI;
  const sweep = 1.5 * Math.PI;
  const norm = max > 0 ? value / max : 0;
  const valA = startA + norm * sweep;

  // Tick marks
  const tickCount = 11;
  for (let i = 0; i <= tickCount; i++) {
    const tickA = startA + (i / tickCount) * sweep;
    const innerR = r + 1;
    const outerR = r + 6;
    ctx.beginPath();
    ctx.moveTo(cx + Math.cos(tickA) * innerR, cy + Math.sin(tickA) * innerR);
    ctx.lineTo(cx + Math.cos(tickA) * outerR, cy + Math.sin(tickA) * outerR);
    ctx.strokeStyle = '#fff';
    ctx.lineWidth = 0.8;
    ctx.lineCap = 'round';
    ctx.stroke();
  }

  // Track arc
  ctx.beginPath(); ctx.arc(cx, cy, r, startA, startA + sweep);
  ctx.strokeStyle = '#383838'; ctx.lineWidth = 2.5; ctx.lineCap = 'round'; ctx.stroke();

  // Value arc — bipolar or unipolar
  if (center !== undefined) {
    // Bipolar: draw from center position outward
    const centerA = startA + center * sweep;
    if (Math.abs(norm - center) > 0.005) {
      const fromA = Math.min(centerA, valA);
      const toA = Math.max(centerA, valA);
      ctx.beginPath(); ctx.arc(cx, cy, r, fromA, toA);
      ctx.strokeStyle = ACCENT; ctx.lineWidth = 3; ctx.lineCap = 'round'; ctx.stroke();
    }
    // Center detent mark
    const detentInner = r - 2;
    const detentOuter = r + 1;
    ctx.beginPath();
    ctx.moveTo(cx + Math.cos(centerA) * detentInner, cy + Math.sin(centerA) * detentInner);
    ctx.lineTo(cx + Math.cos(centerA) * detentOuter, cy + Math.sin(centerA) * detentOuter);
    ctx.strokeStyle = 'rgba(255,255,255,0.5)'; ctx.lineWidth = 1; ctx.stroke();
  } else {
    // Unipolar: draw from start
    if (norm > 0.005) {
      ctx.beginPath(); ctx.arc(cx, cy, r, startA, valA);
      ctx.strokeStyle = ACCENT; ctx.lineWidth = 3; ctx.lineCap = 'round'; ctx.stroke();
    }
  }

  // Knob body
  ctx.beginPath(); ctx.arc(cx, cy, r - 4, 0, Math.PI * 2);
  ctx.fillStyle = '#2a2a2a'; ctx.fill();
  ctx.strokeStyle = '#444'; ctx.lineWidth = 0.5; ctx.stroke();

  // Indicator line
  const il = r - 5;
  ctx.beginPath();
  ctx.moveTo(cx + Math.cos(valA) * 5, cy + Math.sin(valA) * 5);
  ctx.lineTo(cx + Math.cos(valA) * il, cy + Math.sin(valA) * il);
  ctx.strokeStyle = '#fff'; ctx.lineWidth = 2; ctx.lineCap = 'round'; ctx.stroke();

  // Value text
  ctx.fillStyle = 'rgba(255,255,255,0.35)';
  ctx.font = '500 9px Inter, sans-serif';
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText(value, cx, cy);
}

// ── JUCE Bridge ──
// Sends CC changes to the plugin backend (no-op when running in a regular browser)
const _juce = window.__JUCE__ && window.__JUCE__.backend;
function sendCC(cc, value) {
  if (cc < 0) return;
  // Clamp to MIDI range
  const v = Math.max(0, Math.min(127, value));
  if (_juce) _juce.emitEvent("ccChange", { cc, value: v });
}

// Registry of controls by CC for inbound param updates
const ccRegistry = {};
function registerCC(cc, ctrl) { if (cc >= 0) ccRegistry[cc] = ctrl; }

// Listen for param updates pushed from C++ (e.g. program change on the hardware)
if (_juce) {
  _juce.addEventListener("paramUpdate", (e) => {
    const ctrl = ccRegistry[e.cc];
    if (ctrl) ctrl.setValue(e.value);
  });
}

// ── Log ──
function log(msg) {
  const el = document.getElementById('log');
  const d = document.createElement('div');
  d.textContent = new Date().toLocaleTimeString('en-GB', {hour12: false}) + ' ' + msg;
  el.appendChild(d);
  el.scrollTop = el.scrollHeight;
  while (el.children.length > 200) el.removeChild(el.firstChild);
}
log('Ready');

// ── Connection controls ──
let _connected = false;

function toggleAdvanced() {
  const panel = document.getElementById('advanced-panel');
  panel.style.display = panel.style.display === 'none' ? 'block' : 'none';
}

function toggleConnect() {
  const host = document.getElementById('server-host').value;
  const lan = document.getElementById('lan-mode').checked;
  log(_connected ? 'Disconnecting...' : 'Connecting to ' + host + (lan ? ' (LAN)' : ' (WireGuard)') + '...');
  if (_juce) _juce.emitEvent(_connected ? "doDisconnect" : "doConnect", { host, lan });
}

function doPing() {
  log('Measuring latency...');
  if (_juce) _juce.emitEvent("doPing", {});
}

// ── Connection status updates from C++ ──
function updateConnectionStatus(state) {
  const dot = document.getElementById('status-dot');
  const label = document.getElementById('status-label');
  const pill = document.getElementById('status-pill');
  const mode = document.getElementById('conn-mode');
  const rttGroup = document.getElementById('rtt-group');
  const rttVal = document.getElementById('rtt-val');
  const bufGroup = document.getElementById('buf-group');
  const bufVal = document.getElementById('buf-val');
  const btn = document.getElementById('connect-btn');

  const wasConnected = _connected;
  _connected = state.connected;
  if (_connected && !wasConnected) log('Connected via ' + (state.mode || 'unknown'));
  if (!_connected && wasConnected) log('Disconnected');
  dot.className = 'status-dot' + (_connected ? ' live' : '');
  label.textContent = _connected ? 'Live' : 'Offline';
  pill.className = 'status-pill' + (_connected ? ' live' : '');
  mode.textContent = state.mode || '';

  btn.textContent = _connected ? 'Disconnect' : 'Connect';
  btn.className = 'conn-btn' + (_connected ? ' disconnect' : '');

  if (_connected && state.rtt > 0) {
    rttGroup.style.display = 'flex';
    rttVal.textContent = state.rtt;
    rttVal.className = 'stat-val';
  } else {
    rttGroup.style.display = 'none';
  }

  if (_connected && state.bufferMs >= 0) {
    bufGroup.style.display = 'flex';
    bufVal.textContent = state.bufferMs.toFixed(0);
  } else {
    bufGroup.style.display = 'none';
  }

}

// Listen for initial config (server host, WG state) from C++
if (_juce) {
  _juce.addEventListener("connectionStatus", (e) => updateConnectionStatus(e));
  _juce.addEventListener("initConfig", (e) => {
    if (e.host) document.getElementById('server-host').value = e.host;

// ── Control Builders ──
// opts.center: normalized center position for bipolar knobs (e.g. 0.5)
// opts.cc: MIDI CC number for this control
function knob(parent, label, value, max, opts) {
  const center = opts && opts.center;
  const cc = (opts && opts.cc !== undefined) ? opts.cc : -1;
  const d = document.createElement('div'); d.className = 'ctrl';
  const c = document.createElement('canvas'); drawKnob(c, value, max, center);
  const l = document.createElement('div'); l.className = 'ctrl-label'; l.textContent = label;
  d.appendChild(c); d.appendChild(l); parent.appendChild(d);
  let dy0 = null, v0 = null;
  const ctrl = {
    el: d,
    getValue() { return value; },
    setValue(v) { value = v; drawKnob(c, value, max, center); }
  };
  registerCC(cc, ctrl);
  function emitCC() {
    // Scale to 0-127 if max > 127
    const cv = max > 127 ? Math.round(value * 127 / max) : value;
    sendCC(cc, cv);
  }
  c.onmousedown = e => { dy0 = e.clientY; v0 = value; e.preventDefault(); };
  window.addEventListener('mousemove', e => {
    if (dy0 === null) return;
    const nv = Math.max(0, Math.min(max, Math.round(v0 + (dy0 - e.clientY) * 0.5)));
    if (nv !== value) { value = nv; drawKnob(c, value, max, center); emitCC(); }
  });
  window.addEventListener('mouseup', () => { dy0 = null; });
  c.onwheel = e => { e.preventDefault(); const nv = Math.max(0, Math.min(max, value + (e.deltaY < 0 ? 1 : -1))); if (nv !== value) { value = nv; drawKnob(c, value, max, center); emitCC(); } };
  return ctrl;
}

function btn(parent, label, value, text, opts) {
  const cc = (opts && opts.cc !== undefined) ? opts.cc : -1;
  const d = document.createElement('div'); d.className = 'ctrl-btn';
  const b = document.createElement('div');
  b.className = 'btn' + (value ? ' on' : '');
  b.textContent = text || (value ? 'ON' : 'OFF');
  const l = document.createElement('div'); l.className = 'ctrl-label'; l.textContent = label;
  d.appendChild(b); d.appendChild(l); parent.appendChild(d);
  const ctrl = {
    el: d,
    getValue() { return value; },
    setValue(v) { value = v; b.className = 'btn' + (value ? ' on' : ''); if (!text) b.textContent = value ? 'ON' : 'OFF'; }
  };
  registerCC(cc, ctrl);
  b.onclick = () => { ctrl.setValue(value ? 0 : 1); sendCC(cc, value); };
  return ctrl;
}

function shapeSel(parent, value, shapes) {
  const d = document.createElement('div'); d.className = 'shape-sel';
  const opts = [];
  shapes.forEach((name, i) => {
    const opt = document.createElement('div');
    opt.className = 'shape-opt' + (i === value ? ' active' : '');
    const led = document.createElement('div'); led.className = 'shape-led';
    const txt = document.createTextNode(name);
    opt.appendChild(led); opt.appendChild(txt);
    d.appendChild(opt);
    opts.push(opt);
  });
  parent.appendChild(d);
  function update() { opts.forEach((o, i) => { o.className = 'shape-opt' + (i === value ? ' active' : ''); }); }
  d.onclick = () => { value = (value + 1) % shapes.length; update(); };
  return { el: d, getValue() { return value; }, setValue(v) { value = v; update(); } };
}

function vdiv(parent) {
  const d = document.createElement('div'); d.className = 'vdiv'; parent.appendChild(d);
}

function section(parent, label) {
  const s = document.createElement('div'); s.className = 'section';
  if (label) { const l = document.createElement('div'); l.className = 'section-label'; l.textContent = label; s.appendChild(l); }
  parent.appendChild(s);
  return s;
}

  const r = document.createElement('div'); r.className = 'section-row'; parent.appendChild(r); return r;
}

// ── Auto-scale panel to fit viewport ──
function scalePanel() {
  const panel = document.getElementById('panel');
  panel.style.transform = 'none';
  panel.style.position = 'absolute';
  panel.style.transformOrigin = '0 0';
  const pw = panel.offsetWidth;
  const ph = panel.offsetHeight;
  const vw = window.innerWidth;
  const vh = window.innerHeight;
  const scale = Math.min(vw / pw, vh / ph, 1);
  panel.style.transform = `scale(${scale})`;
  panel.style.left = Math.max(0, (vw - pw * scale) / 2) + 'px';
  panel.style.top = Math.max(0, (vh - ph * scale) / 2) + 'px';
}
scalePanel();
window.addEventListener('resize', scalePanel);
